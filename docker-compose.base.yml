# Base service definitions shared by all environments.
# Combine with an override file via the Makefile, e.g.:
#   docker compose -f docker-compose.base.yml -f docker-compose.dev.yml up --build
# (The `version:` key is intentionally omitted — it is obsolete in Compose v2.)

services:
  # Django ASGI app served by Daphne (HTTP API + WebSockets).
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.daphne
    container_name: bgp-llama-daphne
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    volumes:
      # collectstatic writes here; host Nginx / the nginx service serves it.
      - ./staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  # FastAPI microservice for LLaMA / GPT SSE streaming (GPU-backed).
  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.fastapi
    container_name: bgp-llama-fastapi
    restart: unless-stopped
    env_file: .env
    ports:
      - "8002:8002"
    environment:
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
    volumes:
      # Host HF cache, parametrized via .env (defaults to ~/.cache/huggingface).
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: bgp-llama-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/staticfiles:ro
      - ./media:/media:ro
      # SSL certificates (Certbot / Let's Encrypt on the host).
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - fastapi

  db:
    image: postgres:13
    container_name: bgp-llama-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # redis:
  #   image: redis:6-alpine
  #   ports:
  #     - "6379:6379"

volumes:
  pgdata:
