server {
    listen 80;
    server_name _;

    # React SPA build (mounted read-only from ./react_frontend/build).
    root /usr/share/nginx/html;
    index index.html;

    # Proxy the API to the FastAPI backend.
    location /api/ {
        proxy_pass http://api:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: stream tokens through immediately, no buffering/caching.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600;
    }

    # SPA: hashed assets are served as static files; everything else falls back
    # to index.html so client-side routing works on deep links / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
