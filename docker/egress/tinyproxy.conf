# Deny-by-default egress proxy for the agent pod. Only hosts matching the filter are reachable;
# everything else is refused, so an LLM-authored Bash script cannot exfiltrate workspace data to an
# arbitrary host. HTTPS is tunneled via CONNECT (restricted to 443), filtered on the target host.
Port 8888
Listen 0.0.0.0
Timeout 600

# Allow the pod network to use the proxy (access control is by the host filter below, not by IP).
Allow 0.0.0.0/0

# Host allowlist: deny by default, permit only the entries in the filter file (POSIX extended regex
# matched against the requested/CONNECT host).
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
FilterURLs Off

# HTTPS CONNECT only to 443 — no tunneling to arbitrary ports.
ConnectPort 443
